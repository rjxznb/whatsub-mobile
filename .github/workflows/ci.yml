name: CI

on:
  push:
    branches: ['**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-simulator:
    name: Build for iOS Simulator + Screenshot
    # macos-15 has Xcode 16+ by default. macos-14 (Xcode 15.4) can't read
    # the objectVersion 77 .xcodeproj that current XcodeGen generates.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        # Apple now requires iOS 26 SDK (Xcode 26+) for App Store submission.
        # macos-15 image ships multiple Xcode versions side-by-side; this
        # picks the newest installed.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen + xcbeautify
        run: |
          brew install xcodegen xcbeautify

      - name: Show Xcode + SDK
        run: |
          xcodebuild -version
          xcrun --show-sdk-version --sdk iphonesimulator

      - name: Cache sherpa-onnx tarball
        uses: actions/cache@v4
        with:
          path: ~/sherpa-onnx-cache
          key: sherpa-onnx-ios-v1.13.2

      - name: Download sherpa-onnx iOS XCFramework
        run: |
          VERSION="1.13.2"
          TARBALL="sherpa-onnx-v${VERSION}-ios.tar.bz2"
          CACHE_PATH="$HOME/sherpa-onnx-cache/${TARBALL}"
          mkdir -p "$HOME/sherpa-onnx-cache"
          if [ ! -f "$CACHE_PATH" ]; then
            echo "Downloading ${TARBALL}…"
            curl -fL -o "$CACHE_PATH" "https://github.com/k2-fsa/sherpa-onnx/releases/download/v${VERSION}/${TARBALL}"
          else
            echo "Using cached ${TARBALL}"
          fi
          mkdir -p frameworks
          # Tarball layout (verified from CI):
          #   <top>/build-ios/sherpa-onnx.xcframework               (depth 2)
          #   <top>/build-ios/ios-onnxruntime/onnxruntime.xcframework -> 1.17.1/onnxruntime.xcframework (symlink)
          #   <top>/build-ios/ios-onnxruntime/1.17.1/onnxruntime.xcframework/ (the real bundle)
          # Strip 2 levels so sherpa-onnx lands directly, then locate the REAL
          # onnxruntime.xcframework directory (not the symlink) and flatten it up.
          tar -xjf "$CACHE_PATH" -C frameworks --strip-components=2
          REAL_ONNX=$(find frameworks/ -mindepth 2 -name "onnxruntime.xcframework" -type d | head -1)
          if [ -n "$REAL_ONNX" ]; then
            rm -f frameworks/onnxruntime.xcframework   # the broken symlink at top level, if any
            mv "$REAL_ONNX" frameworks/onnxruntime.xcframework
            rm -rf frameworks/ios-onnxruntime
          fi
          ls -lh frameworks/
          # Verify the two XCFrameworks ended up where we expect
          test -d frameworks/sherpa-onnx.xcframework || (echo "sherpa-onnx.xcframework missing"; exit 1)
          test -d frameworks/onnxruntime.xcframework || (echo "onnxruntime.xcframework missing"; exit 1)
          # espeak-ng-data is NOT in the framework tarball — it's bundled with
          # the Piper VOICE MODEL tarball. Also bundle the model itself
          # (.onnx + tokens.txt + .onnx.json) so PiperTTS works offline
          # from first launch — saves the user from a 64MB runtime
          # download + sidesteps the GFW issue with huggingface.co
          # (2026-06-05: per user, the runtime download path showed
          # "测试" silent on success, easier to just bundle).
          MODEL_TARBALL="vits-piper-en_US-ljspeech-medium.tar.bz2"
          MODEL_CACHE="$HOME/sherpa-onnx-cache/${MODEL_TARBALL}"
          if [ ! -f "$MODEL_CACHE" ]; then
            echo "Downloading ${MODEL_TARBALL} (for espeak-ng-data + voice model)…"
            curl -fL -o "$MODEL_CACHE" "https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/${MODEL_TARBALL}"
          fi
          PIPER_EXTRACT=$(mktemp -d)
          tar -xjf "$MODEL_CACHE" -C "$PIPER_EXTRACT"
          ESPEAK_SRC=$(find "$PIPER_EXTRACT" -name "espeak-ng-data" -type d | head -1)
          if [ -z "$ESPEAK_SRC" ]; then
            echo "espeak-ng-data missing from piper model tarball — Piper TTS won't work"
            ls -la "$PIPER_EXTRACT"
            exit 1
          fi
          mkdir -p whatsub-mobile/Resources
          rm -rf whatsub-mobile/Resources/espeak-ng-data
          cp -R "$ESPEAK_SRC" whatsub-mobile/Resources/
          echo "Copied espeak-ng-data ($(du -sh whatsub-mobile/Resources/espeak-ng-data | cut -f1))"
          # Bundle the voice model: .onnx + tokens.txt + .onnx.json
          MODEL_DST=whatsub-mobile/Resources/piper-ljspeech
          rm -rf "$MODEL_DST"
          mkdir -p "$MODEL_DST"
          ONNX_SRC=$(find "$PIPER_EXTRACT" -name "en_US-ljspeech-medium.onnx" | head -1)
          TOKENS_SRC=$(find "$PIPER_EXTRACT" -name "tokens.txt" | head -1)
          JSON_SRC=$(find "$PIPER_EXTRACT" -name "en_US-ljspeech-medium.onnx.json" | head -1)
          for f in "$ONNX_SRC" "$TOKENS_SRC" "$JSON_SRC"; do
            if [ -z "$f" ] || [ ! -f "$f" ]; then
              echo "Piper model file missing: $f"
              exit 1
            fi
            cp "$f" "$MODEL_DST/"
          done
          echo "Copied piper-ljspeech ($(du -sh "$MODEL_DST" | cut -f1)) — bundled voice model"
          rm -rf "$PIPER_EXTRACT"

      - name: Generate .xcodeproj
        run: xcodegen generate --quiet

      - name: Pick a stable iOS Simulator
        id: pick-sim
        run: |
          xcrun simctl list devices available | sed -n '/-- iOS [0-9.]* --/,/^--/p' | head -50
          # Prefer iPhone 15 Pro; fall back to first available iPhone
          DEVICE_NAME="iPhone 15 Pro"
          DEVICE_UDID=$(xcrun simctl list devices available -j | jq -r --arg name "$DEVICE_NAME" '.devices | to_entries | .[] | select(.key | contains("iOS")) | .value[] | select(.name == $name) | .udid' | head -1)
          if [ -z "$DEVICE_UDID" ]; then
            DEVICE_UDID=$(xcrun simctl list devices available -j | jq -r '.devices | to_entries | .[] | select(.key | contains("iOS")) | .value[] | select(.name | startswith("iPhone")) | .udid' | head -1)
          fi
          echo "Using device UDID: $DEVICE_UDID"
          echo "udid=$DEVICE_UDID" >> "$GITHUB_OUTPUT"

      - name: Build for Simulator
        env:
          UDID: ${{ steps.pick-sim.outputs.udid }}
        run: |
          set -o pipefail
          xcodebuild \
            -project whatsub-mobile.xcodeproj \
            -scheme whatsub-mobile \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${UDID}" \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify || (echo "build failed"; exit 1)

      - name: Run unit tests
        env:
          UDID: ${{ steps.pick-sim.outputs.udid }}
        run: |
          set -o pipefail
          xcodebuild \
            -project whatsub-mobile.xcodeproj \
            -scheme whatsub-mobile \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${UDID}" \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            test | xcbeautify

      - name: Boot simulator + install app
        env:
          UDID: ${{ steps.pick-sim.outputs.udid }}
        run: |
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b
          APP_PATH=$(find DerivedData/Build/Products/Debug-iphonesimulator -maxdepth 2 -name "whatsub-mobile.app" | head -1)
          echo "App: $APP_PATH"
          test -d "$APP_PATH"
          xcrun simctl install "$UDID" "$APP_PATH"
          xcrun simctl launch "$UDID" cc.eversay.whatsub.mobile
          # Wait for first frame
          sleep 3

      - name: Screenshot the launch tab
        env:
          UDID: ${{ steps.pick-sim.outputs.udid }}
        run: |
          mkdir -p screenshots
          # Fresh sim install has no Keychain session, so the app launches to
          # AuthGateView. Phase 2b/2c will add a UI test target that injects a
          # mock session + taps through tabs.
          xcrun simctl io "$UDID" screenshot screenshots/01-authgate.png
          ls -la screenshots/

      - name: Upload screenshots artifact
        uses: actions/upload-artifact@v4
        with:
          name: simulator-screenshots-${{ github.sha }}
          path: screenshots/
          retention-days: 14
          if-no-files-found: error
