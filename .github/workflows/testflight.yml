name: TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: testflight
  cancel-in-progress: false  # never cancel an upload in flight

jobs:
  upload:
    name: Archive + Upload to TestFlight
    # macos-15 has Xcode 16+ by default (matches ci.yml — current XcodeGen
    # emits objectVersion 77 which Xcode 15 can't read).
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        # Apple requires iOS 26 SDK (Xcode 26+) for any TestFlight / App Store
        # upload. macos-15 ships several Xcode versions side-by-side; this
        # picks the newest installed.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen + xcbeautify
        run: brew install xcodegen xcbeautify

      - name: Cache sherpa-onnx tarball
        uses: actions/cache@v4
        with:
          path: ~/sherpa-onnx-cache
          key: sherpa-onnx-ios-v1.13.2

      - name: Download sherpa-onnx iOS XCFramework
        run: |
          VERSION="1.13.2"
          TARBALL="sherpa-onnx-v${VERSION}-ios.tar.bz2"
          CACHE_PATH="$HOME/sherpa-onnx-cache/${TARBALL}"
          mkdir -p "$HOME/sherpa-onnx-cache"
          if [ ! -f "$CACHE_PATH" ]; then
            echo "Downloading ${TARBALL}…"
            curl -fL -o "$CACHE_PATH" "https://github.com/k2-fsa/sherpa-onnx/releases/download/v${VERSION}/${TARBALL}"
          else
            echo "Using cached ${TARBALL}"
          fi
          mkdir -p frameworks
          # Tarball layout (verified from CI):
          #   <top>/build-ios/sherpa-onnx.xcframework               (depth 2)
          #   <top>/build-ios/ios-onnxruntime/onnxruntime.xcframework -> 1.17.1/onnxruntime.xcframework (symlink)
          #   <top>/build-ios/ios-onnxruntime/1.17.1/onnxruntime.xcframework/ (the real bundle)
          # Strip 2 levels so sherpa-onnx lands directly, then locate the REAL
          # onnxruntime.xcframework directory (not the symlink) and flatten it up.
          tar -xjf "$CACHE_PATH" -C frameworks --strip-components=2
          REAL_ONNX=$(find frameworks/ -mindepth 2 -name "onnxruntime.xcframework" -type d | head -1)
          if [ -n "$REAL_ONNX" ]; then
            rm -f frameworks/onnxruntime.xcframework   # the broken symlink at top level, if any
            mv "$REAL_ONNX" frameworks/onnxruntime.xcframework
            rm -rf frameworks/ios-onnxruntime
          fi
          ls -lh frameworks/
          # Verify the two XCFrameworks ended up where we expect
          test -d frameworks/sherpa-onnx.xcframework || (echo "sherpa-onnx.xcframework missing"; exit 1)
          test -d frameworks/onnxruntime.xcframework || (echo "onnxruntime.xcframework missing"; exit 1)
          # espeak-ng-data is NOT in the framework tarball — it's bundled with
          # the Piper VOICE MODEL tarball. Download a small piper bundle and
          # extract just espeak-ng-data from it for IPA bundling. The full
          # .onnx model itself is downloaded at runtime by PiperModelDownloader.
          MODEL_TARBALL="vits-piper-en_US-ljspeech-medium.tar.bz2"
          MODEL_CACHE="$HOME/sherpa-onnx-cache/${MODEL_TARBALL}"
          if [ ! -f "$MODEL_CACHE" ]; then
            echo "Downloading ${MODEL_TARBALL} (for espeak-ng-data)…"
            curl -fL -o "$MODEL_CACHE" "https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/${MODEL_TARBALL}"
          fi
          PIPER_EXTRACT=$(mktemp -d)
          tar -xjf "$MODEL_CACHE" -C "$PIPER_EXTRACT"
          ESPEAK_SRC=$(find "$PIPER_EXTRACT" -name "espeak-ng-data" -type d | head -1)
          if [ -z "$ESPEAK_SRC" ]; then
            echo "espeak-ng-data missing from piper model tarball — Piper TTS won't work"
            ls -la "$PIPER_EXTRACT"
            exit 1
          fi
          mkdir -p whatsub-mobile/Resources
          rm -rf whatsub-mobile/Resources/espeak-ng-data
          cp -R "$ESPEAK_SRC" whatsub-mobile/Resources/
          echo "Copied espeak-ng-data ($(du -sh whatsub-mobile/Resources/espeak-ng-data | cut -f1)) to bundle resources"
          rm -rf "$PIPER_EXTRACT"

      - name: Generate .xcodeproj
        run: xcodegen generate --quiet

      - name: Write ASC API key to disk
        env:
          ASC_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          # altool + xcodebuild both look up the key by ID in this dir,
          # with filename pattern AuthKey_<KEY_ID>.p8.
          printf '%s' "$ASC_API_KEY_P8" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          # Also drop a copy at $RUNNER_TEMP for explicit-path tools:
          cp ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 $RUNNER_TEMP/AuthKey.p8

      - name: Set CURRENT_PROJECT_VERSION = run_number + 100
        run: |
          # Bump build number so each TestFlight upload is unique. App Store
          # Connect rejects duplicate (version, build) tuples.
          BUILD_NUM=$((${{ github.run_number }} + 100))
          echo "Setting CURRENT_PROJECT_VERSION=$BUILD_NUM"
          echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV

      - name: Archive
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -o pipefail
          # Automatic signing + ASC API key + -allowProvisioningUpdates
          # lets xcodebuild fetch/create the right cert+profile per config
          # (Distribution for archive). We don't pass CODE_SIGN_IDENTITY here
          # — forcing it conflicts with Automatic mode (see "Apple Distribution
          # has been manually specified" error pattern in CLAUDE.md).
          xcodebuild \
            -project whatsub-mobile.xcodeproj \
            -scheme whatsub-mobile \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ./build/whatsub-mobile.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8" \
            CURRENT_PROJECT_VERSION=$BUILD_NUM \
            DEVELOPMENT_TEAM=Q3BK52FQT9 \
            archive | xcbeautify

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild \
            -exportArchive \
            -archivePath ./build/whatsub-mobile.xcarchive \
            -exportPath ./build/export \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8" | xcbeautify
          ls -la ./build/export/

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA=$(find ./build/export -name "*.ipa" | head -1)
          echo "Uploading $IPA"
          xcrun altool --upload-app \
            -f "$IPA" \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload archive artifact (for forensics on failed uploads)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcarchive-${{ github.sha }}
          path: build/whatsub-mobile.xcarchive
          retention-days: 7
