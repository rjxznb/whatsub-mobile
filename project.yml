name: whatsub-mobile
options:
  bundleIdPrefix: cc.eversay.whatsub
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: zh-Hans
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    DEVELOPMENT_TEAM: Q3BK52FQT9
    MARKETING_VERSION: "0.0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    # Automatic signing — Xcode's Cloud Signing flow:
    # • Debug builds: simulator builds in ci.yml pass CODE_SIGNING_REQUIRED=NO
    #   so signing is bypassed entirely for those.
    # • Release/Archive in testflight.yml: -allowProvisioningUpdates + ASC API
    #   key let xcodebuild fetch/create the Distribution cert + App Store
    #   provisioning profile from Apple servers without any local cert mgmt.
    # We intentionally do NOT set CODE_SIGN_IDENTITY here — Automatic mode
    # picks the right identity per-config, and forcing a specific one
    # ("Apple Distribution" / "Apple Development") causes the "conflicting
    # signing settings" error when xcodebuild tries to reconcile them.
    CODE_SIGN_STYLE: Automatic
    # Localization defaults to Chinese (matches spec § 5.1 "仅中文 hardcoded")
    SWIFT_EMIT_LOC_STRINGS: NO
  configs:
    Debug:
      ENABLE_TESTABILITY: YES
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"

targets:
  whatsub-mobile:
    type: application
    platform: iOS
    sources:
      - path: whatsub-mobile
        excludes:
          - "Info.plist"
          - "PrivacyInfo.xcprivacy"
    resources:
      - whatsub-mobile/Assets.xcassets
      - whatsub-mobile/PrivacyInfo.xcprivacy
      - whatsub-mobile/Resources/ipa-en-us.json
      - whatsub-mobile/Resources/correct.wav
      - whatsub-mobile/Resources/Caveat-Bold.ttf
    info:
      path: whatsub-mobile/Info.plist
      properties:
        CFBundleDisplayName: whatSub
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSupportsIndirectInputEvents: true
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - Caveat-Bold.ttf
        CFBundleURLTypes:
          - CFBundleURLName: cc.eversay.whatsub.mobile
            CFBundleURLSchemes: [whatsub]
    entitlements:
      path: whatsub-mobile/whatsub-mobile.entitlements
      properties:
        com.apple.security.application-groups:
          - group.cc.eversay.whatsub.mobile
    dependencies:
      - target: whatsub-share
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cc.eversay.whatsub.mobile
        INFOPLIST_KEY_CFBundleDisplayName: whatSub
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  whatsub-share:
    type: app-extension
    platform: iOS
    sources:
      - whatsub-share
      - whatsub-mobile/Shared/AppGroup.swift
    info:
      path: whatsub-share/Info.plist
      properties:
        CFBundleDisplayName: 导入到 whatSub
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cc.eversay.whatsub.mobile.share
        INFOPLIST_KEY_CFBundleDisplayName: 导入到 whatSub
    entitlements:
      path: whatsub-share/whatsub-share.entitlements
      properties:
        com.apple.security.application-groups:
          - group.cc.eversay.whatsub.mobile

  whatsub-mobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - whatsub-mobileTests
    dependencies:
      - target: whatsub-mobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cc.eversay.whatsub.mobileTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  whatsub-mobile:
    build:
      targets:
        whatsub-mobile: all
        whatsub-mobileTests: [test]
    test:
      targets:
        - whatsub-mobileTests
