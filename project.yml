name: whatsub-mobile
options:
  bundleIdPrefix: cc.eversay.whatsub
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: zh-Hans
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    DEVELOPMENT_TEAM: Q3BK52FQT9
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    # Automatic signing — Xcode's Cloud Signing flow:
    # • Debug builds: simulator builds in ci.yml pass CODE_SIGNING_REQUIRED=NO
    #   so signing is bypassed entirely for those.
    # • Release/Archive in testflight.yml: -allowProvisioningUpdates + ASC API
    #   key let xcodebuild fetch/create the Distribution cert + App Store
    #   provisioning profile from Apple servers without any local cert mgmt.
    # We intentionally do NOT set CODE_SIGN_IDENTITY here — Automatic mode
    # picks the right identity per-config, and forcing a specific one
    # ("Apple Distribution" / "Apple Development") causes the "conflicting
    # signing settings" error when xcodebuild tries to reconcile them.
    CODE_SIGN_STYLE: Automatic
    # Localization defaults to Chinese (matches spec § 5.1 "仅中文 hardcoded")
    SWIFT_EMIT_LOC_STRINGS: NO
  configs:
    Debug:
      ENABLE_TESTABILITY: YES
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"

targets:
  whatsub-mobile:
    type: application
    platform: iOS
    sources:
      - path: whatsub-mobile
        excludes:
          - "Info.plist"
          - "PrivacyInfo.xcprivacy"
          - "Resources/espeak-ng-data/**"
          - "Resources/piper-ljspeech/**"
    resources:
      - whatsub-mobile/Assets.xcassets
      - whatsub-mobile/PrivacyInfo.xcprivacy
      - whatsub-mobile/Resources/ipa-en-us.json
      - whatsub-mobile/Resources/ecdict-cn.json
      - whatsub-mobile/Resources/correct.wav
      - whatsub-mobile/Resources/Caveat-Bold.ttf
      # NOTE: espeak-ng-data + piper-ljspeech are NOT declared as
      # XcodeGen resources here — every attempt (folder ref, per-file,
      # buildPhase: resources) was silently dropped from the pbxproj's
      # Copy Bundle Resources phase by XcodeGen 2.45.4. The bullet-
      # proof workaround is the postBuildScripts entry at the end of
      # this target — a shell script that copies them into the .app
      # bundle directly after build, BEFORE codesign runs.
    postBuildScripts:
      - name: Embed Piper voice model + espeak-ng-data
        # basedOnDependencyAnalysis=false → run on every build, ignore
        # Xcode's input/output file dependency caching. Cheap (≪1s),
        # safer than missing the copy.
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          APP="$TARGET_BUILD_DIR/$WRAPPER_NAME"
          SRC="$SRCROOT/whatsub-mobile/Resources"
          if [ -d "$SRC/espeak-ng-data" ]; then
            rm -rf "$APP/espeak-ng-data"
            cp -R "$SRC/espeak-ng-data" "$APP/"
            echo "[piper] copied espeak-ng-data ($(du -sh "$APP/espeak-ng-data" | cut -f1)) → .app"
          else
            echo "[piper] WARN: $SRC/espeak-ng-data missing — Piper TTS will silently fail"
          fi
          if [ -d "$SRC/matcha-ljspeech" ]; then
            cp -f "$SRC/matcha-ljspeech/model-steps-3.onnx" "$APP/"
            cp -f "$SRC/matcha-ljspeech/hifigan_v2.onnx" "$APP/"
            cp -f "$SRC/matcha-ljspeech/tokens.txt" "$APP/"
            echo "[tts] copied Matcha voice model → .app (.onnx $(du -h "$APP/model-steps-3.onnx" | cut -f1))"
          else
            echo "[tts] WARN: $SRC/matcha-ljspeech missing — TTS will silently fail"
          fi
    info:
      path: whatsub-mobile/Info.plist
      properties:
        CFBundleDisplayName: whatSub
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSupportsIndirectInputEvents: true
        ITSAppUsesNonExemptEncryption: false
        # 2026-06-17 — UIBackgroundModes: audio RE-ADDED to support the
        # user-toggleable 「锁屏继续播放」 feature in MeView's 「播放」
        # section. Default OFF, so first launch matches v0.0.x (no
        # background audio). When the user opts in, lock-screen audio
        # continues + Now Playing card surfaces video title + thumbnail
        # + ±15s skip controls (wired in `BackgroundAudioCoordinator.swift`).
        #
        # Originally dropped 2026-06-09 because Apple Review (Guideline
        # 2.5.4) couldn't find a persistent-audio surface justifying the
        # entitlement — the entitlement at that point only existed for
        # PiP, which was discretionary. This round the justification is
        # explicit and user-driven: the toggle is the entitlement's
        # raison d'être. ASC review notes for the next submission MUST
        # call out the MeView 「锁屏继续播放」 path so the reviewer
        # locates it. Demo flow: 我的 → 播放 → toggle on → open any
        # Library video → play → lock screen.
        #
        # PiP stays OFF (`allowsPictureInPicturePlayback = false`) — re-
        # add it only if users specifically ask for floating-window UX.
        UIBackgroundModes:
          - audio
        # 跟读 (shadowing) practice — records short user speech then runs
        # SFSpeechRecognizer to score against the cue text. Both keys required
        # on first invocation; iOS shows the system permission alerts.
        NSMicrophoneUsageDescription: "用于跟读练习和对话陪练时录下你的发音，与字幕原文或目标短语做对比。"
        NSSpeechRecognitionUsageDescription: "把跟读练习和对话陪练里的录音转为文字，用于与字幕原文做逐词比对、或判断目标短语是否被正确使用。所有识别在本机完成。"
        # Camera + Photos — shared by two 「眼前」 tab features (2026-06-05):
        #   ① 拍照翻译 (originally 拍照识别短语) — OCR English text on the
        #      page, translate, extract phrases.
        #   ② 实景口语练习 — classify the SCENE in the photo (objects, time
        #      of day, etc.) on-device, derive an English speaking prompt,
        #      grade the user's spoken description.
        # Both use Apple Vision on-device (VNRecognizeTextRequest +
        # VNClassifyImageRequest + a couple of detect rectangles requests).
        # CRUCIAL for App Review: the description spells out that only
        # derived TEXT (OCR / labels) ever leaves the device — the photo
        # itself is never uploaded. ASC Privacy Nutrition Labels must
        # match: Camera = Not Collected, Photos = Not Collected.
        NSCameraUsageDescription: "用相机拍一张图片,在本机离线识别英文文本或场景物体,用于翻译、提取语料、生成英语口语练习题。照片本身不会上传到服务器。"
        NSPhotoLibraryUsageDescription: "从相册选一张图片,在本机离线识别英文文本或场景物体,用于翻译、提取语料、生成英语口语练习题。照片本身不会上传到服务器。"
        UIAppFonts:
          - Caveat-Bold.ttf
        CFBundleURLTypes:
          - CFBundleURLName: cc.eversay.whatsub.mobile
            CFBundleURLSchemes: [whatsub]
    entitlements:
      path: whatsub-mobile/whatsub-mobile.entitlements
      properties:
        com.apple.security.application-groups:
          - group.cc.eversay.whatsub.mobile
        # 2026-06-18 — Live Activity feature (docs/superpowers/plans/2026-06-18-
        # ios-live-activity-import-queue.md). APNs push delivers ContentState
        # updates to the lock screen / Dynamic Island Activity card. Set to
        # `development` here so TestFlight builds reach APNs sandbox; Xcode
        # auto-swaps to `production` for App Store distribution builds.
        aps-environment: development
    dependencies:
      - target: whatsub-share
        embed: true
      - target: whatsub-widget
        embed: true
      - framework: frameworks/sherpa-onnx.xcframework
        embed: false
        link: true
      - framework: frameworks/onnxruntime.xcframework
        embed: false
        link: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cc.eversay.whatsub.mobile
        INFOPLIST_KEY_CFBundleDisplayName: whatSub
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_OBJC_BRIDGING_HEADER: whatsub-mobile/SherpaOnnx-Bridging-Header.h
        OTHER_LDFLAGS: "$(inherited) -lc++"

  whatsub-share:
    type: app-extension
    platform: iOS
    sources:
      - whatsub-share
      - whatsub-mobile/Shared/AppGroup.swift
    info:
      path: whatsub-share/Info.plist
      properties:
        CFBundleDisplayName: 导入到 whatSub
        # Must match the parent app (XcodeGen otherwise defaults a generated
        # extension Info.plist to CFBundleVersion "1"; the CI build-number
        # override sets CURRENT_PROJECT_VERSION, which only flows through if the
        # plist references it). App Store validation rejects a mismatch.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cc.eversay.whatsub.mobile.share
        INFOPLIST_KEY_CFBundleDisplayName: 导入到 whatSub
    entitlements:
      path: whatsub-share/whatsub-share.entitlements
      properties:
        com.apple.security.application-groups:
          - group.cc.eversay.whatsub.mobile

  # iOS Live Activity widget (2026-06-18). Renders the lock-screen card +
  # Dynamic Island compact/minimal/expanded views for the desktop import
  # queue progress Activity. Pushed from backend via APNs HTTP/2 — see
  # docs/superpowers/plans/2026-06-18-ios-live-activity-import-queue.md.
  whatsub-widget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.1"
    sources:
      - whatsub-widget
      - whatsub-mobile/Shared/ImportActivityAttributes.swift
      - whatsub-mobile/App/Theme.swift
    info:
      path: whatsub-widget/Info.plist
      properties:
        CFBundleDisplayName: whatSub Widget
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cc.eversay.whatsub.mobile.widget
        INFOPLIST_KEY_CFBundleDisplayName: whatSub Widget

  whatsub-mobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - whatsub-mobileTests
    dependencies:
      - target: whatsub-mobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cc.eversay.whatsub.mobileTests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  whatsub-mobile:
    build:
      targets:
        whatsub-mobile: all
        whatsub-mobileTests: [test]
    test:
      targets:
        - whatsub-mobileTests
